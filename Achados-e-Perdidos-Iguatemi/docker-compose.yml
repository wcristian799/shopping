services:
  banco:
    image: mariadb:10.11
    container_name: achados-perdidos-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: achados_perdidos_iguatemi
      MARIADB_USER: achados
      MARIADB_PASSWORD: achados123
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - achados_perdidos_db:/var/lib/mysql
      - ./src/database/achados_perdidos_iguatemi.sql:/docker-entrypoint-initdb.d/01-achados-perdidos.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: achados-perdidos-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      banco:
        condition: service_healthy

volumes:
  achados_perdidos_db:
